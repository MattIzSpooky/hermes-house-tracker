services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mydatabase
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://grafana-lgtm:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://grafana-lgtm:4318/v1/traces
      FUNDA_PROXY_URL: http://funda-proxy:8000
    depends_on:
      - postgres
      - ollama-pull
      - funda-proxy
  ollama-pull:
    image: 'ollama/ollama:latest'
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull qwen3.5:0.8b && wait"]
    volumes:
      - ollama_data:/root/.ollama
  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    ports:
      - '3000:3000'
      - '4317'
      - '4318'
  ollama:
    image: 'ollama/ollama:latest'
    ports:
      - '11434'
    volumes:
      - ollama_data:/root/.ollama
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432'

volumes:
  ollama_data:
