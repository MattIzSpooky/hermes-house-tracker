services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mydatabase
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_AI_OLLAMA_BASE_URL: ${SPRING_AI_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://grafana-lgtm:4318/v1/metrics
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://grafana-lgtm:4318/v1/traces
      MANAGEMENT_OPENTELEMETRY_LOGGING_EXPORT_OTLP_ENDPOINT: http://grafana-lgtm:4318/v1/logs
      FUNDA_PROXY_URL: http://funda-proxy:8000
      SPRING_ARTEMIS_BROKER_URL: tcp://activemq:61616
      SPRING_ARTEMIS_USER: artemis
      SPRING_ARTEMIS_PASSWORD: artemis
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/hermes/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8081/realms/hermes
    depends_on:
      postgres:
        condition: service_healthy
      funda-proxy:
        condition: service_started
      grafana-lgtm:
        condition: service_started
      activemq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8081
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/hermes HTTP/1.1\\r\\nhost: localhost\\r\\n\\r\\n' >&3 && grep -q 'hermes' <&3"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
  activemq:
    image: apache/activemq-artemis:2.40.0
    ports:
      - '61616:61616'
      - '8161:8161'
    environment:
      ARTEMIS_USER: artemis
      ARTEMIS_PASSWORD: artemis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8161/console/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
  funda-proxy:
    build: ../funda-proxy
    ports:
      - "8001:8000"
    environment:
      OTEL_SERVICE_NAME: funda-proxy
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-lgtm:4318
      FUNDA_MOCK_MODE: ${FUNDA_MOCK_MODE:-true}
    depends_on:
      grafana-lgtm:
        condition: service_started
  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    ports:
      - '3000:3000'
      - '4317'
      - '4318'
    volumes:
      - ./grafana/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/hermes.yaml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards/hermes:ro
  ollama:
    profiles: ["ollama"]
    image: 'ollama/ollama:latest'
    ports:
      - '11434'
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2:3b && wait"]
  postgres:
    image: 'postgis/postgis:16-3.4'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    configs:
      - source: pgadmin-servers
        target: /pgadmin4/servers.json
      - source: pgadmin-pgpass
        target: /config/pgpass
        mode: 0600
    depends_on:
      postgres:
        condition: service_healthy

configs:
  pgadmin-servers:
    content: |
      {
        "Servers": {
          "1": {
            "Name": "Local Postgres",
            "Group": "Servers",
            "Host": "postgres",
            "Port": 5432,
            "MaintenanceDB": "postgres",
            "Username": "myuser",
            "PassFile": "/config/pgpass"
          }
        }
      }
  pgadmin-pgpass:
    content: "postgres:5432:*:myuser:secret"

volumes:
  ollama_data:
  postgres_data:
