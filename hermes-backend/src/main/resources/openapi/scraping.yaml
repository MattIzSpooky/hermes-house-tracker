openapi: 3.0.3
info:
  title: Hermes Scraping API
  version: 1.0.0

paths:
  /api/scraping-sessions:
    post:
      operationId: createScrapingSession
      tags: [ScrapingSessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScrapingSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrapingSessionResponse'

  /api/scraping-sessions/{id}:
    get:
      operationId: getScrapingSession
      tags: [ScrapingSessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrapingSessionResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  schemas:
    CreateScrapingSessionRequest:
      type: object
      required: [city, pageLimit]
      properties:
        city:
          type: string
          example: amsterdam
        minPrice:
          type: integer
          nullable: true
        maxPrice:
          type: integer
          nullable: true
        minArea:
          type: integer
          nullable: true
        maxArea:
          type: integer
          nullable: true
        pageLimit:
          type: integer
          minimum: 1

    ScrapingSessionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED, TIMED_OUT]
        type:
          type: string
          enum: [SEARCH, RESCRAPE]
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
