openapi: 3.0.3
info:
  title: Hermes API
  description: Real estate tracking API backed by Funda.nl scraping
  version: 1.0.0

paths:
  /api/scraping-sessions:
    post:
      operationId: createScrapingSession
      tags: [ScrapingSessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScrapingSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrapingSessionResponse'

  /api/scraping-sessions/{id}:
    get:
      operationId: getScrapingSession
      tags: [ScrapingSessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrapingSessionResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/listings:
    get:
      operationId: getListings
      tags: [Listings]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: street
          in: query
          schema:
            type: string
        - name: houseNumber
          in: query
          schema:
            type: string
        - name: houseNumberAddition
          in: query
          schema:
            type: string
        - name: zipCode
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: province
          in: query
          schema:
            type: string
        - name: minBedrooms
          in: query
          required: false
          schema:
            type: integer
            nullable: true
        - name: minRooms
          in: query
          required: false
          schema:
            type: integer
            nullable: true
        - name: minLivingAreaM2
          in: query
          required: false
          schema:
            type: integer
            nullable: true
        - name: energyLabel
          in: query
          required: false
          schema:
            type: string
            nullable: true
        - name: radiusKm
          in: query
          required: false
          description: Search radius in kilometres — uses street+houseNumber as centre if set, otherwise city
          schema:
            type: integer
            nullable: true
      responses:
        '200':
          description: Paginated listing results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingPage'

  /api/listings/{id}:
    get:
      operationId: getListing
      tags: [Listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Listing found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingDetailResponse'
        '404':
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/listings/{id}/rescrape:
    post:
      operationId: rescrapeListing
      tags: [Listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Rescrape session enqueued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrapingSessionResponse'
        '404':
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/listings/{id}/report:
    get:
      operationId: getListingReport
      tags: [Listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingReportResponse'
        '404':
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/listings/{id}/summary:
    get:
      operationId: getListingSummary
      tags: [Listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: AI summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiSummaryResponse'
        '404':
          description: Listing or summary not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/listings/{id}/summary/generate:
    post:
      operationId: requestListingSummaryGeneration
      tags: [Listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Generation request accepted
        '404':
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agent-tasks:
    get:
      tags: [agent-tasks]
      operationId: getAgentTasks
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of active agent tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentTaskResponse'

  /api/agent-tasks/{id}:
    delete:
      tags: [agent-tasks]
      operationId: deleteAgentTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted

  /api/notifications:
    get:
      tags: [notifications]
      operationId: getNotifications
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Recent notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationResponse'

  /api/notifications/unread-count:
    get:
      tags: [notifications]
      operationId: getUnreadCount
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Unread notification count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'

  /api/notifications/{id}/read:
    patch:
      tags: [notifications]
      operationId: markNotificationRead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Marked read

components:
  schemas:
    CreateScrapingSessionRequest:
      type: object
      required: [city, pageLimit]
      properties:
        city:
          type: string
          example: amsterdam
        minPrice:
          type: integer
          nullable: true
        maxPrice:
          type: integer
          nullable: true
        minArea:
          type: integer
          nullable: true
        maxArea:
          type: integer
          nullable: true
        pageLimit:
          type: integer
          minimum: 1
          maximum: 5

    ScrapingSessionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED, TIMED_OUT]
        type:
          type: string
          enum: [SEARCH, RESCRAPE]
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    ListingPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ListingSummaryResponse'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    ListingSummaryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        street:
          type: string
        houseNumber:
          type: string
        houseNumberAddition:
          type: string
          nullable: true
        zipCode:
          type: string
        city:
          type: string
        province:
          type: string
        askingPrice:
          type: integer
          nullable: true
        status:
          type: string
          nullable: true
        firstSeenAt:
          type: string
          format: date-time

    ListingDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fundaId:
          type: string
        url:
          type: string
        street:
          type: string
        houseNumber:
          type: string
        houseNumberAddition:
          type: string
          nullable: true
        zipCode:
          type: string
        city:
          type: string
        province:
          type: string
        firstSeenAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        currentPrice:
          type: integer
          nullable: true
        status:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        livingAreaM2:
          type: integer
          nullable: true
        plotAreaM2:
          type: integer
          nullable: true
        rooms:
          type: integer
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        energyLabel:
          type: string
          nullable: true

    ListingReportResponse:
      type: object
      properties:
        listingId:
          type: string
          format: uuid
        daysInHermes:
          type: integer
          format: int64
        currentPrice:
          type: integer
          nullable: true
        initialPrice:
          type: integer
          nullable: true
        priceChangePct:
          type: number
          format: double
          nullable: true
        priceHistory:
          type: array
          items:
            $ref: '#/components/schemas/PricePointResponse'
        currentStatus:
          type: string
          nullable: true

    PricePointResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        price:
          type: integer
          nullable: true

    AiSummaryResponse:
      type: object
      properties:
        listingId:
          type: string
          format: uuid
        summary:
          type: string
        generatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string

    AgentTaskResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        status:
          type: string
        clientId:
          type: string
          format: uuid
        name:
          type: string
        schedule:
          type: string
        lastRunAt:
          type: string
          format: date-time
        nextRunAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    NotificationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        listingIds:
          type: array
          items:
            type: string
            format: uuid
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
        emailSentAt:
          type: string
          format: date-time

    UnreadCountResponse:
      type: object
      properties:
        count:
          type: integer
          format: int64
