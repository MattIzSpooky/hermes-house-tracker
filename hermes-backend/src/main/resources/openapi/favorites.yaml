openapi: 3.0.3
info:
  title: Hermes Favorites API
  version: 1.0.0

paths:
  /api/favorites/{clientId}:
    get:
      operationId: getFavorites
      tags: [Favorites]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of favorites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FavoriteResponse'

  /api/favorites/{clientId}/{listingId}:
    put:
      operationId: addFavorite
      tags: [Favorites]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: listingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Added
    delete:
      operationId: removeFavorite
      tags: [Favorites]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: listingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Removed

components:
  schemas:
    FavoriteResponse:
      type: object
      properties:
        listingId:
          type: string
          format: uuid
        savedAt:
          type: string
          format: date-time

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
