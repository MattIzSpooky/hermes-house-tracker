openapi: 3.0.3
info:
  title: Hermes Agent Tasks API
  version: 1.0.0

paths:
  /api/agent-tasks:
    get:
      tags: [AgentTasks]
      operationId: getAgentTasks
      responses:
        '200':
          description: List of active agent tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentTaskResponse'

  /api/agent-tasks/{id}:
    delete:
      tags: [AgentTasks]
      operationId: deleteAgentTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted

components:
  schemas:
    AgentTaskResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        status:
          type: string
        userId:
          type: string
          format: uuid
        name:
          type: string
        schedule:
          type: string
        lastRunAt:
          type: string
          format: date-time
        nextRunAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
