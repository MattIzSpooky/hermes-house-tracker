openapi: 3.0.3
info:
  title: Hermes Favourites API
  version: 1.0.0

paths:
  /api/favourites/{clientId}:
    get:
      operationId: getFavourites
      tags: [Favourites]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of favourites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FavouriteResponse'

  /api/favourites/{clientId}/{listingId}:
    put:
      operationId: addFavourite
      tags: [Favourites]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: listingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Added
    delete:
      operationId: removeFavourite
      tags: [Favourites]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: listingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Removed

components:
  schemas:
    FavouriteResponse:
      type: object
      properties:
        listingId:
          type: string
          format: uuid
        savedAt:
          type: string
          format: date-time

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
