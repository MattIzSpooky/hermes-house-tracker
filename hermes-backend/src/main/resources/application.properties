spring.application.name=hermes-backend

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=VARCHAR
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.connect-retries=5

# Virtual threads
spring.threads.virtual.enabled=true

# Ollama
spring.ai.ollama.chat.options.model=llama3.2:3b
hermes.ai.chat.model=llama3.2:3b

# Debug Spring AI Ollama HTTP traffic to diagnose tool calling
logging.level.org.springframework.ai.ollama=DEBUG
logging.level.org.springframework.ai.chat.client=DEBUG

# Spring Modulith event publication
spring.modulith.events.completion-mode=delete

# Async executor
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.thread-name-prefix=hermes-async-

# ActiveMQ Artemis
spring.artemis.mode=native
spring.artemis.broker-url=tcp://localhost:61616
spring.artemis.user=${SPRING_ARTEMIS_USER:artemis}
spring.artemis.password=${SPRING_ARTEMIS_PASSWORD:artemis}

# JMS listener
spring.jms.listener.concurrency=3
spring.jms.listener.max-concurrency=3

# Scheduling
spring.task.scheduling.pool.size=4
spring.task.scheduling.thread-name-prefix=hermes-sched-

# Funda proxy
funda.proxy.url=${FUNDA_PROXY_URL:http://localhost:8001}

# Observability
management.tracing.sampling.probability=1.0
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env
management.opentelemetry.tracing.export.otlp.endpoint=${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
management.opentelemetry.logging.export.otlp.endpoint=${MANAGEMENT_OPENTELEMETRY_LOGGING_EXPORT_OTLP_ENDPOINT:http://localhost:4318/v1/logs}

# Add service_name tag to all Micrometer metrics so Grafana dashboard filter works
management.metrics.tags.service_name=${spring.application.name}
# Publish histogram buckets for HTTP server requests so histogram_quantile() works in Prometheus
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Email notifications (set MAIL_USERNAME and MAIL_PASSWORD env vars for Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
hermes.notifications.from-email=${MAIL_USERNAME:noreply@hermes.local}
hermes.notifications.to-email=${MAIL_TO:matthijsk2000@gmail.com}
