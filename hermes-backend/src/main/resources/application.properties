spring.application.name=hermes-backend

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Virtual threads
spring.threads.virtual.enabled=true

# Ollama
spring.ai.ollama.chat.options.model=qwen3.5:0.8b

# Spring Modulith event publication
spring.modulith.events.completion-mode=delete

# Async executor
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.thread-name-prefix=hermes-async-

# Scheduling
spring.task.scheduling.pool.size=4
spring.task.scheduling.thread-name-prefix=hermes-sched-

# Funda proxy
funda.proxy.url=${FUNDA_PROXY_URL:http://localhost:8001}

# Observability
management.tracing.sampling.probability=1.0
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env
management.otlp.logging.endpoint=${MANAGEMENT_OTLP_LOGGING_ENDPOINT:http://localhost:4318/v1/logs}
