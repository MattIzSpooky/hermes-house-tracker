<div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">
  @if (svc.isOpen()) {
    <div @slideUp>
      <app-chat-panel />
    </div>
  }
  <button
    (click)="svc.toggle()"
    aria-label="Toggle chat"
    class="w-14 h-14 rounded-full bg-cyan-400 text-slate-900 shadow-lg flex items-center justify-center hover:bg-cyan-300 focus:outline-none focus:ring-2 focus:ring-cyan-300 transition-colors"
  >
    @if (svc.isStreaming()) {
      <span class="text-sm font-extrabold animate-pulse tracking-widest">···</span>
    } @else if (svc.isOpen()) {
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
      </svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
    }
  </button>
</div>
